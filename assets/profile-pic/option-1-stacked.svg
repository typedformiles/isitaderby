<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Clip everything to the circle -->
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <g clip-path="url(#circleClip)">
    <!-- Base pitch -->
    <rect width="512" height="512" fill="#2d5a27"/>

    <!-- Pitch stripes -->
    <rect x="0" y="0" width="512" height="64" fill="#2a5524"/>
    <rect x="0" y="128" width="512" height="64" fill="#2a5524"/>
    <rect x="0" y="256" width="512" height="64" fill="#2a5524"/>
    <rect x="0" y="384" width="512" height="64" fill="#2a5524"/>

    <!-- Subtle centre circle -->
    <circle cx="256" cy="256" r="150" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.12"/>
    <circle cx="256" cy="256" r="4" fill="#ffffff" opacity="0.18"/>

    <!-- Text stack -->
    <text x="256" y="160" text-anchor="middle" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-weight="900" font-size="62" fill="#f0f0e8" letter-spacing="3">IS IT A</text>
    <text x="256" y="340" text-anchor="middle" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-weight="900" font-size="140" fill="#d4a843" letter-spacing="2">DERBY</text>
    <text x="256" y="440" text-anchor="middle" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-weight="900" font-size="110" fill="#f97316">?</text>
  </g>

  <!-- Ring -->
  <circle cx="256" cy="256" r="252" fill="none" stroke="#f0f0e8" stroke-width="8"/>
</svg>
