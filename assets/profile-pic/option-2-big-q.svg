<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <g clip-path="url(#circleClip)">
    <!-- Split half-and-half pitch (like opposing halves of a derby) -->
    <rect x="0" y="0" width="256" height="512" fill="#2d5a27"/>
    <rect x="256" y="0" width="256" height="512" fill="#1a3a15"/>

    <!-- Halfway line -->
    <line x1="256" y1="0" x2="256" y2="512" stroke="#ffffff" stroke-width="4" opacity="0.25"/>

    <!-- Centre circle on halfway line -->
    <circle cx="256" cy="256" r="130" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.25"/>
    <circle cx="256" cy="256" r="6" fill="#ffffff" opacity="0.35"/>

    <!-- Big question mark -->
    <text x="256" y="400" text-anchor="middle" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-weight="900" font-size="440" fill="#d4a843">?</text>

    <!-- Small wordmark -->
    <text x="256" y="480" text-anchor="middle" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-weight="900" font-size="34" fill="#f0f0e8" letter-spacing="4">ISITADERBY</text>
  </g>

  <!-- Ring -->
  <circle cx="256" cy="256" r="252" fill="none" stroke="#f0f0e8" stroke-width="8"/>
</svg>
