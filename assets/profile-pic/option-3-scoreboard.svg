<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <g clip-path="url(#circleClip)">
    <!-- Dark base -->
    <rect width="512" height="512" fill="#1a3a15"/>

    <!-- Pitch stripes -->
    <rect x="0" y="0" width="512" height="64" fill="#2a5524"/>
    <rect x="0" y="128" width="512" height="64" fill="#2a5524"/>
    <rect x="0" y="256" width="512" height="64" fill="#2a5524"/>
    <rect x="0" y="384" width="512" height="64" fill="#2a5524"/>

    <!-- "IS IT A" line -->
    <text x="256" y="175" text-anchor="middle" font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="55" fill="#f0f0e8" letter-spacing="4">IS IT A</text>

    <!-- Giant DERBY? — 10% bigger, shifted up -->
    <text x="256" y="290" text-anchor="middle" font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="110" fill="#d4a843" letter-spacing="0">DERBY?</text>

    <!-- Score-bar style underline -->
    <rect x="70" y="335" width="372" height="16" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="70" y="335" width="275" height="16" rx="8" fill="#22c55e"/>

    <!-- Score number -->
    <text x="256" y="410" text-anchor="middle" font-family="'Bebas Neue', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="50" fill="#f0f0e8" letter-spacing="2">73 / 100</text>
  </g>

  <!-- Ring -->
  <circle cx="256" cy="256" r="252" fill="none" stroke="#f0f0e8" stroke-width="8"/>
</svg>
